<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a1a" rx="12"/>
  
  <!-- Large compass -->
  <g transform="translate(32, 32)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="24" fill="none" stroke="#F59E0B" stroke-width="3"/>
    <circle cx="0" cy="0" r="3" fill="#F59E0B"/>
    
    <!-- Compass needle -->
    <path d="M0,-20 L4,0 L0,20 L-4,0 Z" fill="#F59E0B"/>
    <path d="M0,-20 L4,0 L0,0 L-4,0 Z" fill="#DC2626"/>
    
    <!-- Cardinal points -->
    <path d="M24,0 L20,-2 L20,2 Z" fill="#2C3E50" opacity="0.8"/>
    <path d="M-24,0 L-20,-2 L-20,2 Z" fill="#2C3E50" opacity="0.8"/>
  </g>
  
  <!-- Mini route lines -->
  <g transform="translate(8, 8)">
    <path d="M0,0 Q8,-4 16,0 T32,0" stroke="#10B981" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M0,0 Q8,4 16,0 T32,0" stroke="#2C3E50" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>
  
  <!-- Mini mountain -->
  <g transform="translate(40, 48)">
    <path d="M0,8 L2,-4 L4,8 L3,2 L5,-6 L7,8" fill="#2C3E50" opacity="0.6"/>
  </g>
  
  <!-- PathCraft text -->
  <text x="32" y="58" font-family="Inter, Arial, sans-serif" font-size="6" font-weight="600" 
        text-anchor="middle" fill="#ffffff">PathCraft</text>
</svg>
